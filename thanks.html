<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — JobAxis Technology Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px;
        }

        .thanks-card {
            max-width: 520px;
            border: 2px solid #333;
            padding: 60px 40px;
            background: #111;
        }

        .check-icon {
            width: 64px;
            height: 64px;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        p {
            color: #999;
            line-height: 1.7;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            padding: 14px 32px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #0a0a0a;
            background: #fff;
            border: 2px solid #fff;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .home-link:hover {
            background: #e4e4e4;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="thanks-card">
        <div class="check-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1>Resume Submitted!</h1>
        <p>Thank you for your interest in JobAxis Technology Services. Our team will review your resume and get back to you within 48 hours.</p>
        <p>We'll reach out with relevant opportunities that match your profile.</p>
        <a href="/" class="home-link">
            <span>Back to Home</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
    </div>
</body>
</html>
